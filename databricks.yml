bundle:
  name: recommender-accelerator

variables:
  catalog:
    default: ioc_sandbox
  schema:
    default: ai_strategy
  lakebase_instance:
    default: lce-upsell-poc-dev

sync:
  include:
    - .build

artifacts:
  default:
    build: apx build

resources:
  jobs:
    recommender_training_pipeline:
      name: "[${bundle.target}] Recommender Training Pipeline"
      tasks:
        - task_key: data_preparation
          notebook_task:
            notebook_path: ./notebooks/00_lce_data_preparation.py

        - task_key: market_basket
          notebook_task:
            notebook_path: ./notebooks/01_lce_market_basket.py
          depends_on:
            - task_key: data_preparation
          existing_cluster_id: 1117-191048-9vmg8d5r  # unity-shared-ai-guest

        - task_key: collaborative_filter
          notebook_task:
            notebook_path: ./notebooks/02_lce_collaborative_filter.py
          depends_on:
            - task_key: data_preparation
          existing_cluster_id: 1117-191048-9vmg8d5r  # unity-shared-ai-guest

        - task_key: lakebase_sync
          notebook_task:
            notebook_path: ./notebooks/03_lakebase_sync.py
            base_parameters:
              lakebase_instance: ${var.lakebase_instance}
              catalog: ${var.catalog}
              schema: ${var.schema}
              app_name: recommender-accelerator
              als_subset_size: "10000"
          depends_on:
            - task_key: market_basket
            - task_key: collaborative_filter
          existing_cluster_id: 1117-191048-9vmg8d5r  # unity-shared-ai-guest

      # Schedule OFF by default. Customer enables when ready.
      # schedule:
      #   quartz_cron_expression: "0 0 6 ? * MON"
      #   timezone_id: "America/Denver"

  apps:
    recommender_app:
      name: "recommender-accelerator-${bundle.target}"
      description: "Lakehouse Market - Product recommendation demo app powered by MBA + ALS models"
      source_code_path: ./.build
      resources:
        - name: "lakebase"
          database:
            instance_name: ${var.lakebase_instance}
            database_name: "databricks_postgres"
            permission: "CAN_CONNECT_AND_CREATE"

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://adb-30827331698809.9.azuredatabricks.net
      profile: lce
