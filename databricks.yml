bundle:
  name: recommender-accelerator

variables:
  catalog:
    default: jdub_demo
  schema:
    default: recommender
  lakebase_instance:
    default: jdub-lakebase-db-instance

sync:
  include:
    - .build

artifacts:
  default:
    build: apx build

resources:
  jobs:
    recommender_training_pipeline:
      name: "[${bundle.target}] Recommender Training Pipeline"
      tasks:
        - task_key: data_generation
          notebook_task:
            notebook_path: ./notebooks/00_data_generation.py

        - task_key: data_preparation
          notebook_task:
            notebook_path: ./notebooks/01_data_preparation.py
          depends_on:
            - task_key: data_generation

        - task_key: market_basket
          notebook_task:
            notebook_path: ./notebooks/02_market_basket.py
          depends_on:
            - task_key: data_preparation
          new_cluster:
            spark_version: "17.3.x-scala2.13"
            node_type_id: "Standard_E4ds_v4"
            num_workers: 2
            data_security_mode: SINGLE_USER

        - task_key: collaborative_filter
          notebook_task:
            notebook_path: ./notebooks/03_collaborative_filter.py
          depends_on:
            - task_key: data_preparation
          new_cluster:
            spark_version: "17.3.x-scala2.13"
            node_type_id: "Standard_E4ds_v4"
            num_workers: 2
            data_security_mode: SINGLE_USER

        - task_key: lakebase_sync
          notebook_task:
            notebook_path: ./notebooks/04_lakebase_sync.py
          depends_on:
            - task_key: market_basket
            - task_key: collaborative_filter

      # Schedule OFF by default. Customer enables when ready.
      # schedule:
      #   quartz_cron_expression: "0 0 6 ? * MON"
      #   timezone_id: "America/Denver"

  apps:
    recommender_app:
      name: "recommender-accelerator-${bundle.target}"
      description: "Lakehouse Market - Product recommendation demo app powered by MBA + ALS models"
      source_code_path: ./.build
      resources:
        - name: "lakebase"
          database:
            instance_name: ${var.lakebase_instance}
            database_name: "databricks_postgres"
            permission: "CAN_CONNECT_AND_CREATE"

targets:
  dev:
    default: true
    mode: development
    workspace:
      profile: azure
