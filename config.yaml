# Recommender Accelerator Configuration — LCE branch
# This branch is wired for the LCE pizza-chain dataset. The data pipeline notebooks
# (00_lce_data_preparation, 01_lce_market_basket, 02_lce_collaborative_filter) read
# from `ioc_sandbox.ai_strategy.raw_orders_staged` and write back to the same schema.
# The bridge sync notebook (03_lakebase_sync.py) reads those Delta outputs and loads
# the four Postgres tables the FastAPI app reads from.

# Unity Catalog scope used by the LCE notebooks (also referenced by databricks.yml variables)
catalog: ioc_sandbox
schema: ai_strategy

# Lakebase instance the bridge sync notebook writes to and the app binds to.
# Create once: `databricks database create-database-instance lce-upsell-poc-dev --capacity CU_1`
lakebase_instance: lce-upsell-poc-dev

# App name (without the bundle target suffix). The sync notebook appends "-${bundle.target}"
# to look up the app's service principal and grant SELECT on the four tables.
app_name: recommender-accelerator
